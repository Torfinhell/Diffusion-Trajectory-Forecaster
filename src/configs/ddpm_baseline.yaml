defaults:
  - model: const
  - data_module: visualize
  - transforms: null
  - logger: wandb
  - _self_
logger:
  logging: False
  print_hparams: True
  project: "ddpm_baseline"
trainer:
  num_epochs: 10
  train_epoch_len: 100
  val_epoch_len: 10
  gradient_clip_val: 6.0
  log_every_n_steps: 10
metrics:
  enabled: True
  val_batches: 4          # how many validation batches to use for metrics
  samples_per_scene: 1
  names: ["ade", "fde"]