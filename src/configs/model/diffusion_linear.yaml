_target_: src.models.DiffusionLinearModel
seed: ${trainer.seed}
load_best_checkpoint: ${trainer.load_best_checkpoint}
cfg_metrics: ${metrics}
grad_clip: ${trainer.gradient_clip_val}
vis_cfg: ${visual}
trainer_cfg: ${trainer}
prediction_target: x0
hid_dim: 256
input_shape: [32, 11, 9]
output_shape: [32, 80, 2]
model:
