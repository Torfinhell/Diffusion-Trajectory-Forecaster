_target_: src.models.DiffusionLinearModel
seed: ${trainer.seed}
load_last_checkpoint: ${trainer.load_last_checkpoint}
cfg_metrics: ${metrics}
grad_clip: ${trainer.gradient_clip_val}
vis_cfg: ${visual}
prediction_target: x0
lr: 2e-3
lr_scheduler:
  name: none
  decay_steps: 20000
  end_lr: 1e-5
oracle_cfg:
  use_for_train_loss: false
  use_for_val_loss: false
  use_for_sampling: false
  sampling_mode: exact
  sampling_t0: 0.001
hid_dim: 256
input_shape: [32, 10, 2]
output_shape: [32, 81, 2]
