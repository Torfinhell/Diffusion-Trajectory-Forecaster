  hid_dim: ${model.hid_dim}
  input_shape: ${model.input_shape}
  output_shape: ${model.output_shape}
loss:
  _target_: src.losses.MSELoss
optimizer:
  _target_: optax.adam
  learning_rate: 2e-3
scheduler: null
