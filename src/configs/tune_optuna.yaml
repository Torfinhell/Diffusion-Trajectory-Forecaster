base_config_name: ddpm_attn

study:
  name: diffusion-attn-ade
  storage: null
  direction: minimize
  load_if_exists: true
  n_trials: 2
  timeout: null

objective:
  metric: val/ADE

trainer:
  num_epochs: 10
  train_epoch_len: 1.0
  val_epoch_len: 1.0
  val_metric_every_n_epochs: 1
  train_metric_every_n_epochs: 1000

runtime:
  accelerator: gpu
  show_progress: false

search:
  widths: [12, 16, 20, 24, 32]
  scene_mlp_ratios: [1.0, 1.5, 2.0]
  attn_mlp_ratios: [1.0, 1.5, 2.0]
  mlp_multiple: 2
  num_sa_mlp:
    min: 1
    max: 3
  num_camlp:
    min: 1
    max: 4
  batch_sizes: [4, 8, 10, 16]
  lr0:
    min: 1e-4
    max: 3e-3
  lrf:
    min: 0.05
    max: 0.5
