data_module:
  datasets:
    train:
      _target_: src.data_module.dataset.DiffusionTrackerDataset
      waymax_config: waymax.config.WOD_1_3_1_TRAINING
      gs_path: gs://waymo_open_dataset_motion_v_1_3_1/uncompressed/tf_example/training/training_tfexample.tfrecord@
      max_num_states: 10
      max_num_objects: 32
      start_ind: 0
      download: true
  dataloaders:
    train:
      _target_: torch.utils.data.DataLoader
      batch_size: 10
      num_workers: 3
      pin_memory: true
  train_ds_cfg: ${data_module.datasets.train}
  val_ds_cfg: null
  test_ds_cfg: null
  train_dl_cfg: ${data_module.dataloaders.train}
  val_dl_cfg: null
  test_dl_cfg: null
gcloud_token: null
